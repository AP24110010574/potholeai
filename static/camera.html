<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#0d1117; color:#e6edf3; font-family:sans-serif; margin:0; padding:10px; }
video { width:100%; border-radius:8px; }
canvas { display:none; }
.btn { background:#f97316; color:white; border:none; padding:12px 24px;
       border-radius:8px; font-size:1rem; width:100%; margin:5px 0; cursor:pointer; }
.btn-stop { background:#ef4444; }
.status { padding:10px; border-radius:8px; margin:5px 0; text-align:center; font-weight:600; }
.safe { background:rgba(34,197,94,0.15); border:1px solid #22c55e; color:#86efac; }
.danger { background:rgba(239,68,68,0.15); border:1px solid #ef4444; color:#fca5a5; }
</style>
</head>
<body>
<h2 style="color:#f97316;">🚧 PotholeAI Camera</h2>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="gps" class="status safe">📍 Getting GPS...</div>
<div id="status" class="status safe">Press Start to begin</div>
<button class="btn" onclick="startDetection()">▶ START DETECTION</button>
<button class="btn btn-stop" onclick="stopDetection()">⏹ STOP</button>
<div id="result"></div>

<script>
let stream = null;
let interval = null;
let lat = 16.4308;
let lng = 80.5682;

// Get GPS
navigator.geolocation.watchPosition(pos => {
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    document.getElementById('gps').innerHTML = 
        '📍 GPS: ' + lat.toFixed(5) + ', ' + lng.toFixed(5) + ' (Live)';
}, err => {
    document.getElementById('gps').innerHTML = '📍 GPS unavailable';
}, { enableHighAccuracy: true });

async function startDetection() {
    // Start camera
    stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment' }  // Use back camera
    });
    document.getElementById('video').srcObject = stream;
    document.getElementById('status').innerHTML = '🟢 DETECTION RUNNING';
    document.getElementById('status').className = 'status safe';
    
    // Capture and detect every 2 seconds
    interval = setInterval(captureAndDetect, 2000);
}

function stopDetection() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (interval) clearInterval(interval);
    document.getElementById('status').innerHTML = '⏹ Stopped';
}

async function captureAndDetect() {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    canvas.toBlob(async blob => {
        const formData = new FormData();
        formData.append('image', blob, 'frame.jpg');
        formData.append('lat', lat);
        formData.append('lng', lng);
        
        try {
            // Send to Flask server
            const SERVER = 'http://10.2.30.12:5001';
            const res = await fetch(SERVER + '/detect', { method:'POST', body:formData });
            const data = await res.json();
            
            if (data.count > 0) {
                document.getElementById('status').innerHTML = 
                    '🚨 POTHOLE DETECTED! ' + Math.round(data.confidence*100) + '% confidence';
                document.getElementById('status').className = 'status danger';
                // Vibrate phone
                if (navigator.vibrate) navigator.vibrate([500, 200, 500]);
            } else {
                document.getElementById('status').innerHTML = '✅ Road Clear';
                document.getElementById('status').className = 'status safe';
            }
        } catch(e) {
            document.getElementById('status').innerHTML = '⚠️ Server not reachable';
        }
    }, 'image/jpeg', 0.8);
}
</script>
</body>
</html>
